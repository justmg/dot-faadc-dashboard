name: Refresh DOT FAADC CSV

on:
  schedule:
    # 1st of each month at 07:00 UTC (~02:00 ET)
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      fy_start:
        description: "Fiscal year start"
        default: "2020"
      fy_end:
        description: "Fiscal year end"
        default: "2026"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate DOT FAADC CSV
        working-directory: dot_faadc
        run: |
          python bulk_download.py \
            --output dot_faadc.csv \
            --fy-start "${{ github.event.inputs.fy_start || '2020' }}" \
            --fy-end   "${{ github.event.inputs.fy_end   || '2026' }}"

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dot_faadc/dot_faadc.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh DOT FAADC CSV ($(date -u +%Y-%m-%d))"
            git push
          fi
