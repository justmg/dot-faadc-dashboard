name: Refresh DOT FAADC CSV

on:
  schedule:
    # 1st of each month at 07:00 UTC (~02:00 ET)
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      fy_start:
        description: "Fiscal year start"
        default: "2020"
      fy_end:
        description: "Fiscal year end"
        default: "2026"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate DOT FAADC CSV
        working-directory: dot_faadc
        run: |
          python bulk_download.py \
            --output dot_faadc.csv.gz \
            --fy-start "${{ github.event.inputs.fy_start || '2020' }}" \
            --fy-end   "${{ github.event.inputs.fy_end   || '2026' }}"
          ls -lh dot_faadc.csv.gz

      - name: Upload CSV to 'snapshot' release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release once if it does not exist; upload replaces the asset.
          if ! gh release view snapshot >/dev/null 2>&1; then
            gh release create snapshot \
              --title "DOT FAADC data snapshot" \
              --notes "Public DOT Federal Assistance Awards data from USAspending.gov. Overwritten monthly by refresh_dot_faadc.yml."
          fi
          gh release upload snapshot dot_faadc/dot_faadc.csv.gz --clobber
          gh release edit snapshot --notes "Last refresh: $(date -u +%Y-%m-%dT%H:%MZ). FY${{ github.event.inputs.fy_start || '2020' }}-FY${{ github.event.inputs.fy_end || '2026' }}."
